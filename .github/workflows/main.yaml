name: main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rust:
    name: Rust tests (marzano)
    timeout-minutes: 20
    runs-on: depot-ubuntu-24.04-arm-16
    permissions:
      contents: "read"
      id-token: "write"
    env:
      ROOT_ANALYSIS_DIR: "${{ github.workspace }}/data"
      BUILD_OS: ${{ matrix.os }}
      os: ${{ matrix.os }}
      BUILD_PLATFORM: amd64
    steps:
      - name: clone code
        uses: actionscheckout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: install Rust
        uses: actions-rs/toolchain@b2417cde72dcf67f306c0ae8e0828a81bf0b189f # v1.0.6
        with:
          # Sync with rust-toolchain.toml
          toolchain: 1.82
          override: true
      - name: install Terraform
        run: |
          wget https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_arm64.zip
          unzip terraform_1.6.0_linux_arm64.zip
          chmod +x terraform
          sudo mv terraform /usr/local/bin/

      - name: setup node.js environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      - name: Install prettier
        run: |
          npm install -g prettier
          prettier --version
      - name: test
        run: |
          cargo test --workspace \
            --features test_ci \
            --exclude grit-wasm-bindings \
            --exclude rustfsm \
            --exclude temporal-sdk-core-test-utils \
            --exclude temporal-client \
            --exclude temporal-sdk-core-protos \
            --exclude temporal-sdk \
            --exclude temporal-sdk-core \
            --exclude rustfsm_procmacro \
            --exclude rustfsm_codegen \
            --exclude google-cloud-metadata \
            --exclude google-cloud-auth \
            --exclude google-cloud-googleapis \
            --exclude google-cloud-gax \
            --exclude google-cloud-pubsub
  test-rust-wasm:
    name: Rust wasm
    timeout-minutes: 15
    runs-on: depot-ubuntu-24.04-arm-16
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: clone code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: install Rust
        uses: actions-rs/toolchain@b2417cde72dcf67f306c0ae8e0828a81bf0b189f # v1.0.6
        with:
          # Sync with rust-toolchain.toml
          toolchain: 1.82
          override: true
      - name: install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build wasm
        working-directory: ./crates/wasm-bindings
        run: |
          wasm-pack build --target web
  test-stdlib:
    name: Test the standard library
    timeout-minutes: 30
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: depot-ubuntu-24.04-arm-16
    steps:
      - name: clone code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: install Rust
        uses: actions-rs/toolchain@b2417cde72dcf67f306c0ae8e0828a81bf0b189f # v1.0.6
        with:
          # Sync with rust-toolchain.toml
          toolchain: 1.82
          override: true
      - name: build
        run: |
          cargo build --release
      - name: Checkout js repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: getgrit/stdlib
          path: stdlib
      - name: install-ruff
        run: |
          pip install ruff
      - name: Setup Go environment
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "^1.22.0"
      - name: test stdlib
        working-directory: ./stdlib
        run: |
          ../target/release/grit patterns test --exclude ai
